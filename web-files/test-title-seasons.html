<script>
// ─── Minimal test harness ────────────────────────────────────────────────────
const _suites = [];
let _current = null;

function describe(name, fn) {
  _current = { name, tests: [] };
  _suites.push(_current);
  try { fn(); } catch(e) {}
}

function test(name, fn) {
  if (!_current) return;
  _current.tests.push({ name, fn });
}

function expect(val) {
  return {
    toBe(expected) {
      if (val !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(val)}`);
    },
    toEqual(expected) {
      if (JSON.stringify(val) !== JSON.stringify(expected))
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(val)}`);
    },
    toBeTruthy() {
      if (!val) throw new Error(`Expected truthy, got ${JSON.stringify(val)}`);
    },
    toBeFalsy() {
      if (val) throw new Error(`Expected falsy, got ${JSON.stringify(val)}`);
    },
    toContain(item) {
      if (!(Array.isArray(val) ? val.includes(item) : String(val).includes(item)))
        throw new Error(`Expected ${JSON.stringify(val)} to contain ${JSON.stringify(item)}`);
    },
    toBeNull() {
      if (val !== null) throw new Error(`Expected null, got ${JSON.stringify(val)}`);
    },
    toBeGreaterThan(n) {
      if (!(val > n)) throw new Error(`Expected ${val} > ${n}`);
    },
    not: {
      toBe(expected) {
        if (val === expected) throw new Error(`Expected not ${JSON.stringify(expected)}`);
      },
      toContain(item) {
        if (Array.isArray(val) ? val.includes(item) : String(val).includes(item))
          throw new Error(`Expected not to contain ${JSON.stringify(item)}`);
      },
    },
  };
}

async function runAll() {
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<p style="color:#aaa">Running…</p>';

  let totalPass = 0, totalFail = 0;
  const html = [];

  for (const suite of _suites) {
    const rows = [];
    for (const test of suite.tests) {
      let passed = false, err = '';
      try {
        const result = test.fn();
        if (result && typeof result.then === 'function') await result;
        passed = true;
        totalPass++;
      } catch(e) {
        err = e.message;
        totalFail++;
      }
      rows.push(`<div class="result ${passed ? 'pass' : 'fail'}">${passed ? '✓' : '✗'} ${test.name}${err ? '<pre>' + err + '</pre>' : ''}</div>`);
    }
    html.push(`<div class="suite"><h2>${suite.name}</h2>${rows.join('')}</div>`);
  }

  const total = totalPass + totalFail;
  const summaryClass = totalFail === 0 ? 'pass' : 'fail';
  html.unshift(`<div class="summary ${summaryClass}">${totalPass}/${total} passed${totalFail ? ` — ${totalFail} failed` : ' ✓'}</div>`);
  resultsEl.innerHTML = html.join('');
}
</script>

<script>
// ════════════════════════════════════════════════════════════════════════════
// SUITE 1: WatchlistProgress — pure helpers
// ════════════════════════════════════════════════════════════════════════════

describe('WatchlistProgress — episode key helpers', () => {
  test('episodeKey formats correctly', () => {
    expect(WatchlistProgress.episodeKey(1, 5)).toBe('1:5');
    expect(WatchlistProgress.episodeKey(0, 2)).toBe('0:2');
  });
});

describe('WatchlistProgress — isEpisodeWatched', () => {
  test('null entry returns false', () => {
    expect(WatchlistProgress.isEpisodeWatched(null, 1, 1)).toBe(false);
  });
  test('legacy-complete (true) treats all episodes as watched', () => {
    expect(WatchlistProgress.isEpisodeWatched(true, 1, 1)).toBe(true);
  });
  test('legacy-complete ({}) treats all episodes as watched', () => {
    expect(WatchlistProgress.isEpisodeWatched({}, 1, 1)).toBe(true);
  });
  test('granular progress: episode in list = watched', () => {
    const entry = { progress: { version: 1, episodes: ['1:1', '1:2'] } };
    expect(WatchlistProgress.isEpisodeWatched(entry, 1, 1)).toBe(true);
    expect(WatchlistProgress.isEpisodeWatched(entry, 1, 3)).toBe(false);
  });
});

describe('WatchlistProgress — isLegacyComplete', () => {
  test('null is not legacy-complete', () => {
    expect(WatchlistProgress.isLegacyComplete(null)).toBe(false);
  });
  test('true is legacy-complete', () => {
    expect(WatchlistProgress.isLegacyComplete(true)).toBe(true);
  });
  test('empty object is legacy-complete', () => {
    expect(WatchlistProgress.isLegacyComplete({})).toBe(true);
  });
  test('granular progress is not legacy-complete', () => {
    const entry = { progress: { version: 1, episodes: ['1:1'] } };
    expect(WatchlistProgress.isLegacyComplete(entry)).toBe(false);
  });
});

describe('WatchlistProgress — markEpisodeWatched', () => {
  test('marks episode on unwatched entry', () => {
    const result = WatchlistProgress.markEpisodeWatched(null, 1, 1, []);
    expect(WatchlistProgress.isEpisodeWatched(result, 1, 1)).toBe(true);
  });
  test('materialises legacy-complete when unchecking an episode', () => {
    const allAired = ['1:1', '1:2', '1:3'];
    const result = WatchlistProgress.unmarkEpisodeWatched({}, 1, 2, allAired);
    expect(WatchlistProgress.isEpisodeWatched(result, 1, 1)).toBe(true);
    expect(WatchlistProgress.isEpisodeWatched(result, 1, 2)).toBe(false);
    expect(WatchlistProgress.isEpisodeWatched(result, 1, 3)).toBe(true);
  });
  test('preserves rating and note', () => {
    const entry = { rating: 8, note: 'Great', progress: { version: 1, episodes: [] } };
    const result = WatchlistProgress.markEpisodeWatched(entry, 1, 1, []);
    expect(result.rating).toBe(8);
    expect(result.note).toBe('Great');
  });
});

describe('WatchlistProgress — markSeasonWatched / unmarkSeasonWatched', () => {
  test('marks all episodes in a season', () => {
    const airedKeys = ['2:1', '2:2', '2:3'];
    const result = WatchlistProgress.markSeasonWatched(null, airedKeys);
    expect(WatchlistProgress.isEpisodeWatched(result, 2, 1)).toBe(true);
    expect(WatchlistProgress.isEpisodeWatched(result, 2, 3)).toBe(true);
  });
  test('unmarks only episodes in specified season', () => {
    const entry = { progress: { version: 1, episodes: ['1:1', '2:1', '2:2'] } };
    const result = WatchlistProgress.unmarkSeasonWatched(entry, 2, ['1:1', '2:1', '2:2']);
    expect(WatchlistProgress.isEpisodeWatched(result, 1, 1)).toBe(true);
    expect(WatchlistProgress.isEpisodeWatched(result, 2, 1)).toBe(false);
  });
  test('empty season does not become complete', () => {
    const result = WatchlistProgress.markSeasonWatched(null, []);
    const airedEps = [];
    expect(WatchlistProgress.isSeasonFullyWatched(result, 3, airedEps)).toBe(false);
  });
});

describe('WatchlistProgress — markAllWatched / clearAllProgress', () => {
  test('markAllWatched marks all provided keys', () => {
    const keys = ['1:1', '1:2', '2:1'];
    const result = WatchlistProgress.markAllWatched(null, keys);
    expect(WatchlistProgress.isEpisodeWatched(result, 1, 1)).toBe(true);
    expect(WatchlistProgress.isEpisodeWatched(result, 2, 1)).toBe(true);
  });
  test('clearAllProgress returns null', () => {
    const result = WatchlistProgress.clearAllProgress({ progress: { version: 1, episodes: ['1:1'] } });
    expect(result).toBeNull();
  });
});

describe('WatchlistProgress — isSeasonFullyWatched / isSeasonPartiallyWatched', () => {
  test('fully watched', () => {
    const airedEps = [{ seasonNumber: 1, episodeNumber: 1 }, { seasonNumber: 1, episodeNumber: 2 }];
    const entry    = { progress: { version: 1, episodes: ['1:1', '1:2'] } };
    expect(WatchlistProgress.isSeasonFullyWatched(entry, 1, airedEps)).toBe(true);
  });
  test('partially watched', () => {
    const airedEps = [{ seasonNumber: 1, episodeNumber: 1 }, { seasonNumber: 1, episodeNumber: 2 }];
    const entry    = { progress: { version: 1, episodes: ['1:1'] } };
    expect(WatchlistProgress.isSeasonPartiallyWatched(entry, 1, airedEps)).toBe(true);
  });
  test('legacy-complete is fully watched, not partial', () => {
    const airedEps = [{ seasonNumber: 1, episodeNumber: 1 }];
    expect(WatchlistProgress.isSeasonFullyWatched({}, 1, airedEps)).toBe(true);
    expect(WatchlistProgress.isSeasonPartiallyWatched({}, 1, airedEps)).toBe(false);
  });
});

describe('WatchlistProgress — itemWatchState', () => {
  test('null entry = unwatched', () => {
    const { state } = WatchlistProgress.itemWatchState(null, null);
    expect(state).toBe('unwatched');
  });
  test('legacy-complete = watched', () => {
    const { state } = WatchlistProgress.itemWatchState({}, null);
    expect(state).toBe('watched');
  });
  test('granular: all watched = watched', () => {
    const seasons = [{ seasonNumber: 1, episodes: [
      { seasonNumber: 1, episodeNumber: 1, airDate: '2000-01-01' },
      { seasonNumber: 1, episodeNumber: 2, airDate: '2000-01-08' },
    ]}];
    const entry = { progress: { version: 1, episodes: ['1:1', '1:2'] } };
    expect(WatchlistProgress.itemWatchState(entry, seasons).state).toBe('watched');
  });
  test('granular: some watched = inprogress', () => {
    const seasons = [{ seasonNumber: 1, episodes: [
      { seasonNumber: 1, episodeNumber: 1, airDate: '2000-01-01' },
      { seasonNumber: 1, episodeNumber: 2, airDate: '2000-01-08' },
    ]}];
    const entry = { progress: { version: 1, episodes: ['1:1'] } };
    expect(WatchlistProgress.itemWatchState(entry, seasons).state).toBe('inprogress');
  });
  test('specials do not count toward title completion', () => {
    // Only regular seasons (seasonNumber > 0) are counted
    const seasons = [
      { seasonNumber: 0, episodes: [{ seasonNumber: 0, episodeNumber: 1, airDate: '2000-01-01' }] },
      { seasonNumber: 1, episodes: [{ seasonNumber: 1, episodeNumber: 1, airDate: '2000-01-01' }] },
    ];
    const entry = { progress: { version: 1, episodes: ['1:1'] } };
    expect(WatchlistProgress.itemWatchState(entry, seasons).state).toBe('watched');
  });
  test('future episodes do not block completion', () => {
    const future = new Date(Date.now() + 86400 * 30 * 1000).toISOString().slice(0, 10);
    const seasons = [{ seasonNumber: 1, episodes: [
      { seasonNumber: 1, episodeNumber: 1, airDate: '2000-01-01' },
      { seasonNumber: 1, episodeNumber: 2, airDate: future }, // future
    ]}];
    const entry = { progress: { version: 1, episodes: ['1:1'] } };
    expect(WatchlistProgress.itemWatchState(entry, seasons).state).toBe('watched');
  });
});

describe('WatchlistProgress — isAiredEpisode', () => {
  test('no airDate = assumed aired', () => {
    expect(WatchlistProgress.isAiredEpisode({ airDate: null })).toBe(true);
  });
  test('past date = aired', () => {
    expect(WatchlistProgress.isAiredEpisode({ airDate: '2000-01-01' })).toBe(true);
  });
  test('future date = not aired', () => {
    const future = new Date(Date.now() + 86400 * 7 * 1000).toISOString().slice(0, 10);
    expect(WatchlistProgress.isAiredEpisode({ airDate: future })).toBe(false);
  });
});

describe('WatchlistProgress — airedEpisodeKeys', () => {
  test('collects only aired episodes', () => {
    const future = new Date(Date.now() + 86400 * 7 * 1000).toISOString().slice(0, 10);
    const seasons = [{
      seasonNumber: 1,
      episodes: [
        { seasonNumber: 1, episodeNumber: 1, airDate: '2000-01-01' },
        { seasonNumber: 1, episodeNumber: 2, airDate: future },
      ]
    }];
    const keys = WatchlistProgress.airedEpisodeKeys(seasons);
    expect(keys).toContain('1:1');
    expect(keys).not.toContain('1:2');
  });
});
</script>

// Minimal mock items
const MOVIE_ITEM = { id: 'movies::Action::Die Hard', title: 'Die Hard', contentType: 'movies', kind: 'movie', poster: '' };
const TV_ITEM    = { id: 'tvSeries::Drama::Breaking Bad', title: 'Breaking Bad', contentType: 'tvSeries', kind: 'tvSeries', poster: '', link: 'https://www.imdb.com/title/tt0903747/' };
const ANIME_ITEM = { id: 'anime::Action::Naruto', title: 'Naruto', contentType: 'anime', kind: 'anime', poster: '', link: 'https://anilist.co/anime/20' };

// Default resolution mock — used unless the test overrides
const DEFAULT_RESOLUTION = { source: 'tmdb', tmdbId: 1, isNegative: false };

/**
 * Creates a WatchlistSeriesMetadata mock. Automatically injects resolveSeriesId
 * and clearItemResolutionCache if not provided, so tests don't need to change
 * when the loadSeriesMetadata call chain gains new steps.
 */
function mockMeta(overrides) {
  return {
    resolveSeriesId: async () => DEFAULT_RESOLUTION,
    clearItemResolutionCache: () => {},
    ...overrides,
  };
}

// Auto-inject resolveSeriesId + clearItemResolutionCache into any direct
// window.WatchlistSeriesMetadata = {...} assignment that omits them.
// This keeps older test cases working without editing each one.
(function installMetaInterceptor() {
  let _actual = window.WatchlistSeriesMetadata;
  Object.defineProperty(window, 'WatchlistSeriesMetadata', {
    configurable: true,
    get() { return _actual; },
    set(val) {
      if (val && typeof val === 'object') {
        if (!val.resolveSeriesId) val.resolveSeriesId = async () => DEFAULT_RESOLUTION;
        if (!val.clearItemResolutionCache) val.clearItemResolutionCache = () => {};
      }
      _actual = val;
    },
  });
})();

function makeSlot() {
  const el = document.createElement('div');
  document.body.appendChild(el);
  return el;
}

function makeCallbacks(watchedEntry = null) {
  let _entry = watchedEntry;
  return {
    getWatchEntry: () => _entry,
    saveWatchedEntry: (e) => { _entry = e; },
    updateCardInPlace: () => {},
    updateHeaderWatchState: () => {},
    updateDetailActions: () => {},
    _getEntry: () => _entry,
  };
}

describe('itemProgressState derivation', () => {
  const P = () => window.WatchlistProgress;

  function deriveState(raw) {
    // Mirrors the app.js itemProgressState logic for testing without app.js
    if (!raw) return 'unwatched';
    // normalizeWatchEntry equivalent
    if (raw === true) return 'watched'; // legacy true = {}
    const entry = typeof raw === 'object' ? raw : null;
    if (!entry) return 'unwatched';
    if (!P() || P().isLegacyComplete(entry)) return 'watched';
    const prog = P().getProgress(entry);
    if (prog && Array.isArray(prog.episodes) && prog.episodes.length > 0) return 'inProgress';
    return 'unwatched';
  }

  test('no entry → unwatched', () => {
    expect(deriveState(null)).toBe('unwatched');
    expect(deriveState(undefined)).toBe('unwatched');
  });

  test('legacy true → watched', () => {
    expect(deriveState(true)).toBe('watched');
  });

  test('empty object {} → watched (legacy-complete)', () => {
    expect(deriveState({})).toBe('watched');
  });

  test('entry with rating only → watched (no granular progress)', () => {
    expect(deriveState({ rating: 8 })).toBe('watched');
  });

  test('entry with empty episodes array → unwatched', () => {
    expect(deriveState({ progress: { version: 1, episodes: [] } })).toBe('unwatched');
  });

  test('entry with 1 watched episode → inProgress', () => {
    expect(deriveState({ progress: { version: 1, episodes: ['1:1'] } })).toBe('inProgress');
  });

  test('entry with multiple watched episodes → inProgress', () => {
    expect(deriveState({ progress: { version: 1, episodes: ['1:1', '1:2', '2:1'] } })).toBe('inProgress');
  });
});
