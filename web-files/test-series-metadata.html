<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Series Metadata Tests</title>
  <style>
    body { font-family: monospace; background: #0e1117; color: #cdd9e5; margin: 0; padding: 1.5rem; }
    h1 { font-size: 1rem; color: #8b949e; margin: 0 0 1rem; text-transform: uppercase; letter-spacing: .12em; }
    .suite { margin-bottom: 1.5rem; }
    .suite-name { font-size: .9rem; font-weight: 700; color: #58a6ff; margin-bottom: .4rem; }
    .test { display: flex; align-items: baseline; gap: .6rem; padding: .15rem 0; font-size: .8rem; }
    .test-pass::before { content: "✓"; color: #3fb950; }
    .test-fail::before { content: "✗"; color: #f85149; }
    .test-name { color: #cdd9e5; }
    .test-error { color: #f85149; font-size: .75rem; margin-top: .15rem; margin-left: 1.2rem; white-space: pre-wrap; }
    .summary { margin-top: 1rem; padding: .75rem 1rem; border-radius: 6px; font-size: .85rem; }
    .summary-pass { background: rgba(63,185,80,.12); color: #3fb950; }
    .summary-fail { background: rgba(248,81,73,.12); color: #f85149; }
  </style>
</head>
<body>
  <h1>Series Metadata · Browser Tests</h1>
  <div id="results"></div>

  <script>
    // ─── Minimal test harness ──────────────────────────────────────────────
    const SUITES = [];
    let _current = null;

    function describe(name, fn) {
      _current = { name, tests: [] };
      SUITES.push(_current);
      fn();
      _current = null;
    }

    function test(name, fn) {
      _current.tests.push({ name, fn });
    }

    const expect = (val) => ({
      toBe: (exp) => { if (val !== exp) throw new Error(`Expected ${JSON.stringify(exp)}, got ${JSON.stringify(val)}`); },
      toBeNull: () => { if (val !== null) throw new Error(`Expected null, got ${JSON.stringify(val)}`); },
      toBeDefined: () => { if (val === undefined) throw new Error("Expected value to be defined"); },
      not: {
        toBe: (exp) => { if (val === exp) throw new Error(`Expected NOT ${JSON.stringify(exp)}`); },
        toMatch: (re) => { if (re.test(String(val))) throw new Error(`Expected NOT to match ${re}`); },
        toHaveBeenCalled: () => { /* skip – no spy support needed */ },
        toBeCalled: () => { /* skip */ },
      },
      toMatch: (re) => { if (!re.test(String(val))) throw new Error(`Expected ${JSON.stringify(val)} to match ${re}`); },
      toEqual: (exp) => { if (JSON.stringify(val) !== JSON.stringify(exp)) throw new Error(`Expected ${JSON.stringify(exp)}, got ${JSON.stringify(val)}`); },
      toHaveLength: (n) => { if (val.length !== n) throw new Error(`Expected length ${n}, got ${val.length}`); },
      toHaveProperty: (key) => { if (!(key in val)) throw new Error(`Expected object to have property "${key}"`); },
      toMatchObject: (sub) => {
        for (const [k, v] of Object.entries(sub)) {
          if (JSON.stringify(val[k]) !== JSON.stringify(v))
            throw new Error(`Key "${k}": expected ${JSON.stringify(v)}, got ${JSON.stringify(val[k])}`);
        }
      },
      toContain: (item) => {
        if (!val.includes(item)) throw new Error(`Expected array to contain ${JSON.stringify(item)}`);
      },
    });
  </script>

  <!-- Set up globals that series-metadata.js depends on -->
  <script>
    window.WATCHLIST_CONFIG = { tmdbApiKey: "TEST_TMDB", omdbApiKey: "TEST_OMDB" };
    window.WatchlistMetadata = {
      extractImdbId: (url) => {
        const m = String(url || "").match(/imdb\.com\/title\/(tt\d+)/);
        return m ? m[1] : null;
      },
      extractAnilistId: (url) => {
        const m = String(url || "").match(/anilist\.co\/anime\/(\d+)/);
        return m ? Number(m[1]) : null;
      },
      isAnilistLink: (url) => /anilist\.co\/anime\/\d+/.test(String(url || "")),
      extractMalId: (url) => {
        const m = String(url || "").match(/myanimelist\.net\/anime\/(\d+)/);
        return m ? Number(m[1]) : null;
      },
      isMalLink: (url) => /myanimelist\.net\/anime\/\d+/.test(String(url || "")),
    };
    window.WatchlistI18n = { getLocale: () => "en" };
  </script>

  <!-- Load the module under test -->
  <script src="js/series-metadata.js"></script>

  <!-- Test definitions -->
  <script>
    const SM = window.WatchlistSeriesMetadata;
    const CACHE_KEY = "watchlist-series-cache-v5";

    function clearCache() {
      localStorage.removeItem(CACHE_KEY);
    }

    // ── _normalizeTmdbSeries ──────────────────────────────────────
    describe("_normalizeTmdbSeries", () => {
      test("returns null for missing name", () => {
        expect(SM._normalizeTmdbSeries({}, 1)).toBeNull();
      });
      test("normalizes a full TMDb series JSON", () => {
        const json = {
          name: "Breaking Bad", original_name: "Breaking Bad",
          poster_path: "/abc.jpg", overview: "Chemistry teacher.",
          status: "Ended", first_air_date: "2008-01-20",
          last_air_date: "2013-09-29", number_of_seasons: 5, number_of_episodes: 62,
        };
        const result = SM._normalizeTmdbSeries(json, 1396);
        expect(result).toMatchObject({ source: "tmdb", tmdbId: 1396, title: "Breaking Bad", totalSeasons: 5, totalEpisodes: 62 });
        expect(result.poster).toMatch(/tmdb\.org.*abc\.jpg/);
      });
      test("uses fallbackPoster when no poster_path", () => {
        const result = SM._normalizeTmdbSeries({ name: "Show" }, 99, "https://example.com/fb.jpg");
        expect(result.poster).toBe("https://example.com/fb.jpg");
      });
      test("handles invalid number_of_seasons gracefully", () => {
        const result = SM._normalizeTmdbSeries({ name: "Show", number_of_seasons: "N/A" }, 99);
        expect(result.totalSeasons).toBeNull();
      });
    });

    // ── _normalizeTmdbSeasonSummary ──────────────────────────────
    describe("_normalizeTmdbSeasonSummary", () => {
      test("returns null when season_number is missing", () => {
        expect(SM._normalizeTmdbSeasonSummary({}, 1)).toBeNull();
      });
      test("normalizes season 0 as specials", () => {
        const result = SM._normalizeTmdbSeasonSummary({ season_number: 0, name: "Specials", episode_count: 3 }, 1396);
        expect(result.isSpecials).toBe(true);
        expect(result.episodeCount).toBe(3);
        expect(result.isSynthetic).toBe(false);
      });
      test("normalizes a regular season", () => {
        const json = { season_number: 2, name: "Season 2", poster_path: "/s2.jpg", episode_count: 13, air_date: "2009-03-08", overview: "Year two." };
        const result = SM._normalizeTmdbSeasonSummary(json, 1396);
        expect(result).toMatchObject({ source: "tmdb", seriesTmdbId: 1396, seasonNumber: 2, name: "Season 2", episodeCount: 13, airDate: "2009-03-08", isSpecials: false });
        expect(result.poster).toMatch(/s2\.jpg/);
      });
      test("falls back to provided poster when no poster_path", () => {
        const result = SM._normalizeTmdbSeasonSummary({ season_number: 1 }, 99, "https://fallback.jpg");
        expect(result.poster).toBe("https://fallback.jpg");
      });
      test("generates season name from number when name is missing", () => {
        const result = SM._normalizeTmdbSeasonSummary({ season_number: 3 }, 99);
        expect(result.name).toBe("Season 3");
      });
    });

    // ── _normalizeTmdbEpisode ────────────────────────────────────
    describe("_normalizeTmdbEpisode", () => {
      test("returns null when episode_number is missing", () => {
        expect(SM._normalizeTmdbEpisode({}, 1)).toBeNull();
      });
      test("normalizes a full episode", () => {
        const json = {
          episode_number: 3, season_number: 1, name: "The Bag",
          still_path: "/still.jpg", overview: "Walter deals.", runtime: 48, air_date: "2008-02-10",
        };
        const result = SM._normalizeTmdbEpisode(json, 1396);
        expect(result).toMatchObject({ source: "tmdb", episodeNumber: 3, seasonNumber: 1, runtimeMinutes: 48, progressKey: "1:3" });
        expect(result.still).toMatch(/still\.jpg/);
        expect(result.isAired).toBe(true);
      });
      test("still falls back to seasonPoster then fallbackPoster", () => {
        const json = { episode_number: 1, season_number: 1 };
        expect(SM._normalizeTmdbEpisode(json, 99, "https://season.jpg", "https://fb.jpg").still).toBe("https://season.jpg");
        expect(SM._normalizeTmdbEpisode(json, 99, "", "https://fb.jpg").still).toBe("https://fb.jpg");
      });
      test("marks future episode as not aired", () => {
        const future = new Date(Date.now() + 7 * 86400 * 1000).toISOString().slice(0, 10);
        const result = SM._normalizeTmdbEpisode({ episode_number: 1, season_number: 1, air_date: future }, 99);
        expect(result.isAired).toBe(false);
      });
    });

    // ── _normalizeOmdbSeason ─────────────────────────────────────
    describe("_normalizeOmdbSeason", () => {
      test("returns empty for empty Episodes", () => {
        expect(SM._normalizeOmdbSeason({ Episodes: [] }, 1)).toEqual([]);
        expect(SM._normalizeOmdbSeason({}, 1)).toEqual([]);
      });
      test("normalizes OMDb episode list", () => {
        const json = { Episodes: [{ Episode: "1", Title: "Pilot", Released: "2008-01-20" }] };
        const results = SM._normalizeOmdbSeason(json, 1);
        expect(results).toHaveLength(1);
        expect(results[0]).toMatchObject({ source: "omdb", seasonNumber: 1, episodeNumber: 1, title: "Pilot", airDate: "2008-01-20", still: "", progressKey: "1:1" });
      });
      test("skips N/A episode numbers", () => {
        const json = { Episodes: [{ Episode: "N/A", Title: "?" }, { Episode: "1", Title: "Valid" }] };
        expect(SM._normalizeOmdbSeason(json, 2)).toHaveLength(1);
      });
      test("uses fallback title when Title is N/A", () => {
        const json = { Episodes: [{ Episode: "5", Title: "N/A" }] };
        expect(SM._normalizeOmdbSeason(json, 1)[0].title).toBe("Episode 5");
      });
    });

    // ── _isAired ─────────────────────────────────────────────────
    describe("_isAired", () => {
      test("true for past dates", () => { expect(SM._isAired("2020-01-01")).toBe(true); });
      test("false for future dates", () => {
        const future = new Date(Date.now() + 86400 * 1000).toISOString().slice(0, 10);
        expect(SM._isAired(future)).toBe(false);
      });
      test("true for null/empty (unknown = treat as aired)", () => {
        expect(SM._isAired(null)).toBe(true);
        expect(SM._isAired("")).toBe(true);
      });
    });

    // ── _parsePositiveCount ──────────────────────────────────────
    describe("_parsePositiveCount", () => {
      test("parses valid positive integers", () => {
        expect(SM._parsePositiveCount(5)).toBe(5);
        expect(SM._parsePositiveCount("12")).toBe(12);
      });
      test("returns null for 0, negative, or N/A", () => {
        expect(SM._parsePositiveCount(0)).toBeNull();
        expect(SM._parsePositiveCount(-1)).toBeNull();
        expect(SM._parsePositiveCount("N/A")).toBeNull();
        expect(SM._parsePositiveCount(null)).toBeNull();
      });
    });

    // ── _anilistDateStr ──────────────────────────────────────────
    describe("_anilistDateStr", () => {
      test("formats complete date", () => {
        expect(SM._anilistDateStr({ year: 2021, month: 4, day: 3 })).toBe("2021-04-03");
      });
      test("year-only", () => {
        expect(SM._anilistDateStr({ year: 2021 })).toBe("2021");
      });
      test("null for missing/empty", () => {
        expect(SM._anilistDateStr(null)).toBeNull();
        expect(SM._anilistDateStr({})).toBeNull();
      });
    });

    // ── _stripHtml ───────────────────────────────────────────────
    describe("_stripHtml", () => {
      test("removes HTML tags", () => {
        expect(SM._stripHtml("<b>Hello</b>")).toBe("Hello");
      });
      test("handles null/undefined", () => {
        expect(SM._stripHtml(null)).toBe("");
        expect(SM._stripHtml(undefined)).toBe("");
      });
    });

    // ── Cache: locale-specific keys ──────────────────────────────
    describe("Cache locale-specific keys", () => {
      test("en and ar keys differ", () => {
        const enKey = "metadata:v5:series:tmdb:1396:en";
        const arKey = "metadata:v5:series:tmdb:1396:ar";
        expect(enKey).not.toBe(arKey);
      });
      test("stores distinct values per locale", () => {
        clearCache();
        const cache = {
          "metadata:v5:series:tmdb:1396:en": { cachedAt: Date.now(), ttlMs: 1000, payload: { series: { title: "Breaking Bad" } }, state: "available" },
          "metadata:v5:series:tmdb:1396:ar": { cachedAt: Date.now(), ttlMs: 1000, payload: { series: { title: "بريكينغ باد" } }, state: "available" },
        };
        localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        const stored = JSON.parse(localStorage.getItem(CACHE_KEY));
        expect(stored["metadata:v5:series:tmdb:1396:en"].payload.series.title).toBe("Breaking Bad");
        expect(stored["metadata:v5:series:tmdb:1396:ar"].payload.series.title).toBe("بريكينغ باد");
      });
    });

    // ── Cache: negative resolution entry ─────────────────────────
    describe("Cache negative ID-resolution", () => {
      test("negative entry has negative=true", () => {
        clearCache();
        const key = "metadata:v5:resolve:negative:imdb:tt0000001";
        const cache = { [key]: { cachedAt: Date.now(), ttlMs: 7200000, negative: true } };
        localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        const stored = JSON.parse(localStorage.getItem(CACHE_KEY));
        expect(stored[key].negative).toBe(true);
      });
    });

    // ── Async: offline without cache ─────────────────────────────
    describe("fetchSeriesMetadata offline without cache", () => {
      test("returns offlineNoCache when fetch fails and no cache", async () => {
        clearCache();
        const resolveKey = "metadata:v5:resolve:imdb:tt9999999";
        const cache = { [resolveKey]: { cachedAt: Date.now(), ttlMs: 30*24*3600*1000, source: "tmdb", tmdbId: 99999, imdbId: "tt9999999" } };
        localStorage.setItem(CACHE_KEY, JSON.stringify(cache));

        const origFetch = window.fetch;
        window.fetch = () => Promise.reject(new Error("offline"));
        try {
          const result = await SM.fetchSeriesMetadata({ contentType: "tvSeries", link: "https://www.imdb.com/title/tt9999999/" }, "en");
          expect(result.state).toBe("offlineNoCache");
        } finally {
          window.fetch = origFetch;
        }
      });
    });

    // ── Async: movies return invalidId ────────────────────────────
    describe("fetchSeriesMetadata movies return invalidId", () => {
      test("returns invalidId for movie content type", async () => {
        clearCache();
        const origFetch = window.fetch;
        let fetchCalled = false;
        window.fetch = () => { fetchCalled = true; return Promise.reject(new Error("should not call")); };
        try {
          const result = await SM.fetchSeriesMetadata({ contentType: "movies", link: "https://www.imdb.com/title/tt0111161/" }, "en");
          expect(result.state).toBe("invalidId");
          expect(fetchCalled).toBe(false);
        } finally {
          window.fetch = origFetch;
        }
      });
    });

    // ── Normalized shape equivalence ─────────────────────────────
    describe("Normalized shape equivalence across sources", () => {
      test("TMDb and OMDb episodes share common fields", () => {
        const tmdbEp = SM._normalizeTmdbEpisode({ episode_number: 1, season_number: 1, name: "Pilot", air_date: "2008-01-20" }, 99);
        const omdbEps = SM._normalizeOmdbSeason({ Episodes: [{ Episode: "1", Title: "Pilot", Released: "2008-01-20" }] }, 1);
        const omdbEp = omdbEps[0];
        for (const field of ["episodeNumber","seasonNumber","title","airDate","progressKey","still","overview"]) {
          expect(tmdbEp).toHaveProperty(field);
          expect(omdbEp).toHaveProperty(field);
        }
      });
      test("progressKey format S:E is identical between sources", () => {
        const tmdb = SM._normalizeTmdbEpisode({ episode_number: 5, season_number: 2 }, 99);
        const omdb = SM._normalizeOmdbSeason({ Episodes: [{ Episode: "5" }] }, 2)[0];
        expect(tmdb.progressKey).toBe("2:5");
        expect(omdb.progressKey).toBe("2:5");
      });
    });

  </script>

  <!-- Run all tests and render results -->
  <script>
    (async function runAll() {
      const container = document.getElementById("results");
      let totalPass = 0, totalFail = 0;

      for (const suite of SUITES) {
        const suiteDiv = document.createElement("div");
        suiteDiv.className = "suite";
        const suiteTitle = document.createElement("div");
        suiteTitle.className = "suite-name";
        suiteTitle.textContent = suite.name;
        suiteDiv.appendChild(suiteTitle);

        for (const t of suite.tests) {
          try {
            const ret = t.fn();
            if (ret instanceof Promise) await ret;
            totalPass++;
            const el = document.createElement("div");
            el.className = "test test-pass";
            el.innerHTML = `<span class="test-name">${t.name}</span>`;
            suiteDiv.appendChild(el);
          } catch (err) {
            totalFail++;
            const el = document.createElement("div");
            el.className = "test test-fail";
            el.innerHTML = `<span class="test-name">${t.name}</span><div class="test-error">${err.message}</div>`;
            suiteDiv.appendChild(el);
          }
        }

        container.appendChild(suiteDiv);
      }

      const summary = document.createElement("div");
      summary.className = `summary ${totalFail === 0 ? "summary-pass" : "summary-fail"}`;
      summary.textContent = `${totalFail === 0 ? "All" : totalFail + " failed —"} ${totalPass} passed${totalFail ? ", " + totalFail + " failed" : ""} (${totalPass + totalFail} total)`;
      container.appendChild(summary);

      document.title = `${totalFail === 0 ? "✓" : "✗"} Series Metadata Tests`;
    })();
  </script>
</body>
</html>
