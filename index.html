<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Personal watchlist of movies, TV series, and anime organized by genre."
    />
    <title>Watchlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="header">
        <div class="header__main">
          <div>
            <h1 class="header__title" id="headerTitle">Watchlist</h1>
            <p class="header__meta" id="stats" aria-live="polite"></p>
          </div>
          <div class="header__actions">
            <button type="button" class="btn btn--primary" id="addBtn">
              Add title
            </button>
            <button type="button" class="btn btn--text" id="importBtn">
              Import
            </button>
            <button type="button" class="btn btn--text" id="exportBtn">
              Export
            </button>
            <input
              type="file"
              id="importInput"
              accept="application/json,.json"
              hidden
            />
            <button type="button" class="btn btn--text" id="signOutBtn">
              Sign out
            </button>
          </div>
        </div>
      </header>

      <section class="panel" aria-label="Filters">
        <nav class="type-tabs" role="tablist" aria-label="Content type">
            <button
              type="button"
              class="type-tab type-tab--active"
              role="tab"
              aria-selected="true"
              data-type="all"
            >
              <span class="type-tab__label">All</span>
              <span class="type-tab__count" data-count="all">0</span>
            </button>
            <button
              type="button"
              class="type-tab"
              role="tab"
              aria-selected="false"
              data-type="movies"
            >
              <span class="type-tab__icon" aria-hidden="true">🎬</span>
              <span class="type-tab__label">Movies</span>
              <span class="type-tab__count" data-count="movies">0</span>
            </button>
            <button
              type="button"
              class="type-tab"
              role="tab"
              aria-selected="false"
              data-type="tvSeries"
            >
              <span class="type-tab__icon" aria-hidden="true">📺</span>
              <span class="type-tab__label">TV</span>
              <span class="type-tab__count" data-count="tvSeries">0</span>
            </button>
            <button
              type="button"
              class="type-tab"
              role="tab"
              aria-selected="false"
              data-type="anime"
            >
              <span class="type-tab__icon" aria-hidden="true">🎌</span>
              <span class="type-tab__label">Anime</span>
              <span class="type-tab__count" data-count="anime">0</span>
            </button>
        </nav>

        <div class="panel__filters">
          <label class="search" for="searchInput">
            <input
              type="search"
              id="searchInput"
              class="search__input"
              placeholder="Search titles, actors, or summaries…"
              autocomplete="off"
            />
          </label>

          <div class="genre-filter">
            <select id="genreSelect" class="genre-filter__select" aria-label="Filter by genre">
              <option value="">All genres</option>
            </select>
            <div class="genre-filter__chips" id="genreFilterChips"></div>
          </div>

          <label class="filter-check">
            <input type="checkbox" id="watchedOnly" />
            <span>Watched only</span>
          </label>
        </div>
      </section>

      <main class="main" id="mainContent">
        <div class="loading" id="loading">Loading watchlist…</div>
      </main>

      <footer class="footer">
        <p>Lists save on this device only until cloud sync is added. Export on one device, import on another to copy your list.</p>
      </footer>
    </div>

    <div class="modal" id="itemModal" hidden>
      <div class="modal__backdrop" data-action="close-modal"></div>
      <div
        class="modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <header class="modal__header">
          <h2 class="modal__title" id="modalTitle">Add title</h2>
          <button
            type="button"
            class="modal__close"
            data-action="close-modal"
            aria-label="Close"
          >
            ×
          </button>
        </header>

        <form class="modal__form" id="itemForm">
          <div class="form-grid">
            <label class="form-field">
              <span class="form-field__label">Type</span>
              <select name="contentType" id="formType" class="select" required>
                <option value="movies">Movie</option>
                <option value="tvSeries">TV Series</option>
                <option value="anime">Anime</option>
              </select>
            </label>

            <label class="form-field" id="formatField">
              <span class="form-field__label">Format</span>
              <select name="kind" id="formKind" class="select">
                <option value="movie">Single film</option>
                <option value="franchise">Film series</option>
              </select>
            </label>

            <label class="form-field form-field--full">
              <span class="form-field__label">Main genre</span>
              <select name="genre" id="formGenre" class="select" required>
                <option value="" disabled selected>Choose genre</option>
              </select>
            </label>

            <div class="form-field form-field--full">
              <span class="form-field__label">Secondary genres</span>
              <select id="formSecondaryAdd" class="select">
                <option value="">Add another genre…</option>
              </select>
              <div class="genre-chips" id="formSecondaryChips"></div>
            </div>

            <label class="form-field form-field--full">
              <span class="form-field__label">Title</span>
              <input
                type="text"
                name="title"
                id="formTitle"
                class="form-input"
                required
              />
            </label>

            <div class="form-field form-field--full">
              <span class="form-field__label">Lead actors</span>
              <div class="inline-add">
                <input
                  type="text"
                  id="formLeadInput"
                  class="form-input"
                  placeholder="Actor name"
                />
                <button type="button" class="btn btn--ghost btn--sm" id="formLeadAdd">
                  Add
                </button>
              </div>
              <div class="genre-chips" id="formLeadChips"></div>
            </div>

            <label class="form-field form-field--full">
              <span class="form-field__label">Link</span>
              <input
                type="url"
                name="link"
                id="formLink"
                class="form-input"
                placeholder="IMDb or Rotten Tomatoes URL"
              />
            </label>

            <label class="form-field form-field--full">
              <span class="form-field__label">Summary</span>
              <textarea
                name="summary"
                id="formSummary"
                class="form-textarea"
                rows="2"
                required
              ></textarea>
            </label>
          </div>

          <footer class="modal__footer">
            <button
              type="button"
              class="btn btn--danger"
              id="deleteBtn"
              hidden
            >
              Delete
            </button>
            <div class="modal__footer-right">
              <button type="button" class="btn btn--ghost" data-action="close-modal">
                Cancel
              </button>
              <button type="submit" class="btn btn--primary">Save</button>
            </div>
          </footer>
        </form>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/genres.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
